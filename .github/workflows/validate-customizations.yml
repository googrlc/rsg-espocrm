name: Validate Customizations

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      - name: PHP lint (custom)
        run: |
          if [ -d custom ]; then
            find custom -name "*.php" -exec php -l {} \;
          else
            echo "custom/ not found, skipping PHP lint."
          fi

      - name: JavaScript syntax check (client/custom/src)
        run: |
          if [ -d client/custom/src ]; then
            find client/custom/src -name "*.js" -exec node --check {} \;
          else
            echo "client/custom/src not found, skipping JS syntax check."
          fi

      - name: JSON metadata validation
        run: |
          python3 - <<'PY'
          import json
          import os
          import sys

          root = "custom/Espo/Custom/Resources"
          if not os.path.isdir(root):
              print(f"{root} not found, skipping JSON validation.")
              sys.exit(0)

          errors = []
          for current_root, _, files in os.walk(root):
              for file_name in files:
                  if not file_name.endswith(".json"):
                      continue
                  path = os.path.join(current_root, file_name)
                  try:
                      with open(path, "r", encoding="utf-8") as f:
                          json.load(f)
                  except Exception as e:
                      errors.append(f"{path}: {e}")

          if errors:
              for error in errors:
                  print(error)
              sys.exit(1)

          print("All JSON valid")
          PY
